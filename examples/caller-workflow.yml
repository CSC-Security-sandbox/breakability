# Caller Workflow Template for Breakability Analysis
#
# Copy this file to your repo at .github/workflows/breakability.yml
# It triggers on: cron (weekly), manual dispatch, or new Dependabot PRs.
#
# Prerequisites:
#   1. The breakability repo must be accessible to this repo's GITHUB_TOKEN
#      (same org, or pass a PAT with repo scope as `token`)
#   2. For AI-powered comments, set CURSOR_API_KEY as a repo secret
#   3. For private registries, create .github/breakability-config.yml
#      (see examples/breakability-config.yml)

name: Breakability Analysis

on:
  schedule:
    - cron: '0 6 * * 1'

  workflow_dispatch:
    inputs:
      pr_filter:
        description: 'Comma-separated PR numbers (empty = all open Dependabot PRs)'
        required: false
        default: ''
      batch_count:
        description: 'Number of parallel batches'
        required: false
        default: '4'
        type: choice
        options: ['1', '2', '4', '6']
      skip_agent:
        description: 'Skip AI agent (deterministic only)'
        required: false
        type: boolean
        default: false

  pull_request:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  breakability:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    uses: CSC-Security-sandbox/breakability/.github/workflows/breakability-reusable.yml@v1
    with:
      pr_filter: ${{ github.event.inputs.pr_filter || '' }}
      batch_count: ${{ fromJson(github.event.inputs.batch_count || '4') }}
      skip_agent: ${{ github.event.inputs.skip_agent == 'true' }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      cursor_api_key: ${{ secrets.CURSOR_API_KEY }}
