# Breakability Configuration
#
# Place this file at .github/breakability-config.yml in your repo.
# Only needed if you have private registries or custom infra patterns.
# If this file doesn't exist, defaults work for public dependencies.

# ─────────────────────────────────────────────────────────
# Private npm Registries
# ─────────────────────────────────────────────────────────
# The breakability tool needs to know which npm scopes are private
# so it can skip public-registry API diff and use the right .npmrc.
#
# private_registries:
#   - scope: "@your-org"
#     registry_url: "https://npm.pkg.github.com"
#     auth_token_env: "GH_PACKAGES_TOKEN"
#   - scope: "@your-internal"
#     registry_url: "https://pkgs.dev.azure.com/your-org/_packaging/feed/npm/registry/"
#     auth_token_env: "AZURE_ARTIFACTS_TOKEN"

# ─────────────────────────────────────────────────────────
# Private Go Modules
# ─────────────────────────────────────────────────────────
# go:
#   goprivate: "github.com/your-org/*"
#   token_env: "GOPRIVATE_TOKEN"

# ─────────────────────────────────────────────────────────
# Extra Infra Error Patterns
# ─────────────────────────────────────────────────────────
# Patterns that indicate infrastructure failures (not real build breaks).
# These are treated as "skip" rather than "fail".
#
# extra_infra_patterns:
#   - "Cannot find module '@your-org/"
#   - "ETARGET No matching version found"
#   - "your-private-registry.com: connection refused"

# ─────────────────────────────────────────────────────────
# Ignore Patterns
# ─────────────────────────────────────────────────────────
# ignore:
#   directories:
#     - "legacy/"
#     - "deprecated/"
#   packages:
#     - "@types/jest"
#     - "eslint-plugin-*"
