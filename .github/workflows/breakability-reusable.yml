# Reusable Breakability Analysis Workflow
#
# Full pipeline: discover → deterministic → probe → AI → reconcile → comment → merge plan
#
# Usage in your repo (~15 lines):
#   jobs:
#     breakability:
#       uses: CSC-Security-sandbox/breakability/.github/workflows/breakability-reusable.yml@v1
#       with:
#         batch_count: 4
#       secrets:
#         token: ${{ secrets.GITHUB_TOKEN }}
#         cursor_api_key: ${{ secrets.CURSOR_API_KEY }}
#
name: Breakability Analysis

on:
  workflow_call:
    inputs:
      pr_filter:
        description: 'Comma-separated PR numbers (empty = all open Dependabot PRs)'
        required: false
        type: string
        default: ''
      batch_count:
        description: 'Number of parallel analysis batches'
        required: false
        type: number
        default: 4
      skip_agent:
        description: 'Skip AI agent (deterministic + template comments only)'
        required: false
        type: boolean
        default: false
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      go_version:
        description: 'Go version'
        required: false
        type: string
        default: '1.22'
      python_version:
        description: 'Python version'
        required: false
        type: string
        default: '3.12'
      config_path:
        description: 'Path to breakability-config.yml in your repo (for private registries, infra patterns)'
        required: false
        type: string
        default: '.github/breakability-config.yml'
      breakability_ref:
        description: 'Git ref for the breakability tool repo (branch, tag, or SHA)'
        required: false
        type: string
        default: 'v1'
      pr_label:
        description: 'Label to filter PRs by (default: dependencies)'
        required: false
        type: string
        default: 'dependencies'
    secrets:
      token:
        description: 'GitHub token with PR and Issues write permissions'
        required: false
      cursor_api_key:
        description: 'Cursor agent API key (for AI-powered comments)'
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: breakability-${{ github.repository }}
  cancel-in-progress: false

env:
  BRK_DIR: .breakability

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Job 1: Discover PRs and split into batches
  # ═══════════════════════════════════════════════════════════════════════
  discover:
    runs-on: [self-hosted, Linux, X64, breakability]
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.split.outputs.matrix }}
      pr_count: ${{ steps.split.outputs.pr_count }}
    steps:
      - name: Discover and split PRs
        id: split
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
          BATCH_COUNT: ${{ inputs.batch_count }}
          PR_FILTER: ${{ inputs.pr_filter }}
          PR_LABEL: ${{ inputs.pr_label }}
        run: |
          if [[ -n "$PR_FILTER" ]]; then
            PR_NUMS=$(echo "$PR_FILTER" | tr ',' '\n' | tr -d ' ' | sort -n)
          else
            PR_NUMS=$(gh pr list --repo "$GITHUB_REPOSITORY" \
              --label "$PR_LABEL" --state open \
              --json number --jq '.[].number' --limit 500 | sort -n)
          fi

          TOTAL=$(echo "$PR_NUMS" | grep -c '[0-9]' || echo 0)
          echo "Total PRs to analyze: $TOTAL"
          echo "pr_count=$TOTAL" >> "$GITHUB_OUTPUT"

          if [[ "$TOTAL" -le 5 ]]; then
            BATCH_COUNT=1
          fi

          mapfile -t ALL_PRS < <(echo "$PR_NUMS")
          PER_BATCH=$(( (TOTAL + BATCH_COUNT - 1) / BATCH_COUNT ))

          MATRIX_JSON='{"include":['
          FIRST=true
          for (( b=0; b<BATCH_COUNT; b++ )); do
            START=$(( b * PER_BATCH ))
            BATCH_PRS=""
            for (( j=START; j<START+PER_BATCH && j<TOTAL; j++ )); do
              [[ -n "$BATCH_PRS" ]] && BATCH_PRS="$BATCH_PRS,"
              BATCH_PRS="$BATCH_PRS${ALL_PRS[$j]}"
            done
            [[ -z "$BATCH_PRS" ]] && continue
            [[ "$FIRST" == "true" ]] && FIRST=false || MATRIX_JSON="$MATRIX_JSON,"
            MATRIX_JSON="$MATRIX_JSON{\"batch_id\":\"$((b+1))\",\"pr_filter\":\"$BATCH_PRS\"}"
            echo "  Batch $((b+1)): $BATCH_PRS"
          done
          MATRIX_JSON="$MATRIX_JSON]}"

          echo "Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════════════
  # Job 2: Deterministic analysis (parallel batches)
  # ═══════════════════════════════════════════════════════════════════════
  deterministic:
    needs: discover
    runs-on: [self-hosted, Linux, X64, breakability]
    timeout-minutes: 60
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout breakability tool
        uses: actions/checkout@v4
        with:
          repository: CSC-Security-sandbox/breakability
          ref: ${{ inputs.breakability_ref }}
          path: .breakability
          token: ${{ secrets.token || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Fetch all PR branches for analysis
        run: git fetch --all --prune --quiet

      - name: Run deterministic analysis (batch ${{ matrix.batch_id }})
        run: |
          chmod +x $BRK_DIR/scripts/build-check.sh
          bash $BRK_DIR/scripts/build-check.sh
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
          GITHUB_TOKEN: ${{ secrets.token || github.token }}
          PR_FILTER: ${{ matrix.pr_filter }}
          BATCH_ID: ${{ matrix.batch_id }}
          REPO_ROOT: ${{ github.workspace }}
          BREAKABILITY_SCRIPTS_DIR: ${{ github.workspace }}/.breakability/scripts
          BREAKABILITY_PROMPTS_DIR: ${{ github.workspace }}/.breakability/prompts

      - name: Upload batch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-${{ matrix.batch_id }}
          path: |
            /tmp/build-results-${{ matrix.batch_id }}.json
            /tmp/pr-*.diff
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════
  # Job 3: Merge + AI + Comments + Merge Plan
  # ═══════════════════════════════════════════════════════════════════════
  finalize:
    needs: [discover, deterministic]
    runs-on: [self-hosted, Linux, X64, breakability]
    timeout-minutes: 120
    if: always() && needs.discover.result == 'success'
    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout breakability tool
        uses: actions/checkout@v4
        with:
          repository: CSC-Security-sandbox/breakability
          ref: ${{ inputs.breakability_ref }}
          path: .breakability
          token: ${{ secrets.token || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Download all batch results
        uses: actions/download-artifact@v4
        with:
          path: /tmp/batch-results
          pattern: batch-*

      - name: Merge batch results
        run: |
          chmod +x $BRK_DIR/scripts/merge-results.sh
          bash $BRK_DIR/scripts/merge-results.sh
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
          GITHUB_TOKEN: ${{ secrets.token || github.token }}

      - name: Show build results summary
        if: always()
        run: |
          python3 -c "
          import json
          with open('/tmp/build-results.json') as f:
              data = json.load(f)
          prs = data.get('prs', {})
          print(f'PRs analyzed: {len(prs)}')
          for num, pr in sorted(prs.items(), key=lambda x: int(x[0])):
              verdict = pr.get('build', {}).get('verdict', '?')
              vl = pr.get('verification_label', '?')
              pkg = pr.get('package', '?')
              print(f'  PR #{num}: {pkg} {pr.get(\"from\",\"?\")}→{pr.get(\"to\",\"?\")} | {verdict} | {vl}')
          " || echo "Failed to parse build-results.json"

      # ── Generate authoritative verdicts ────────────────────────────
      - name: Generate authoritative verdicts
        run: |
          python3 $BRK_DIR/scripts/verdict_contract.py /tmp/build-results.json --write
        env:
          PYTHONPATH: ${{ github.workspace }}/.breakability/scripts

      # ── Behavioral probe (deterministic runtime verification) ──────
      - name: Run behavioral probe
        continue-on-error: true
        timeout-minutes: 15
        run: |
          python3 $BRK_DIR/scripts/differential-probe.py
        env:
          DP_RESULTS: /tmp/build-results.json
          DP_DETERMINISTIC_ONLY: 'true'
          DP_MAX_PRS: '20'
          DP_REPO_ROOT: ${{ github.workspace }}
          BREAKABILITY_PROMPTS_DIR: ${{ github.workspace }}/.breakability/prompts

      # ── Post-probe verdict reconciliation ──────────────────────────
      - name: Reconcile verdicts with probe data
        run: |
          python3 $BRK_DIR/scripts/verdict_contract.py /tmp/build-results.json --write
        env:
          PYTHONPATH: ${{ github.workspace }}/.breakability/scripts

      # ── Install AI agent CLI ───────────────────────────────────────
      - name: Install AI agent CLI
        if: ${{ inputs.skip_agent != true }}
        id: agent_install
        run: |
          if curl -fsS https://cursor.com/install | bash 2>/dev/null; then
            echo "$HOME/.local/bin" >> $GITHUB_PATH
            echo "agent_available=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::Cursor agent CLI install failed"
            echo "agent_available=false" >> $GITHUB_OUTPUT
          fi

      # ── Create merge plan issue (early, for linking in comments) ───
      - name: Create merge plan issue
        if: always()
        id: merge_plan
        run: |
          OLD_ISSUES=$(gh issue list --label breakability-merge-plan --state open --json number --jq '.[].number' 2>/dev/null || true)
          for issue_num in $OLD_ISSUES; do
            gh issue close "$issue_num" --comment "Superseded by new analysis run." || true
          done
          ISSUE_URL=$(gh issue create \
            --title "Breakability Merge Plan — $(date +%Y-%m-%d)" \
            --label "breakability-merge-plan" \
            --body "Merge plan is being generated..." 2>&1) || true
          if [ -n "$ISSUE_URL" ]; then
            ISSUE_NUM=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$' || true)
            echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}

      # ── AI-powered comment generation ──────────────────────────────
      - name: Generate AI comments
        if: ${{ inputs.skip_agent != true }}
        id: ai_comments
        continue-on-error: true
        timeout-minutes: 90
        run: |
          ANALYSIS_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MERGE_PLAN_ARG=""
          if [ -n "${{ steps.merge_plan.outputs.issue_num }}" ]; then
            MERGE_PLAN_ARG="--merge-plan-issue ${{ steps.merge_plan.outputs.issue_num }}"
          fi

          python3 $BRK_DIR/scripts/generate_ai_comments.py /tmp/build-results.json \
            --prompt $BRK_DIR/prompts/breakability-prompt.md \
            --model claude-4.5-sonnet \
            --run-url "$ANALYSIS_RUN_URL" \
            $MERGE_PLAN_ARG \
          && echo "ai_comments=true" >> $GITHUB_OUTPUT \
          || echo "ai_comments=false" >> $GITHUB_OUTPUT
        env:
          BRK_AGENT_MODE: live
          BRK_AGENT_MODEL: claude-4.5-sonnet
          GH_TOKEN: ${{ secrets.token || github.token }}
          GITHUB_TOKEN: ${{ secrets.token || github.token }}
          CURSOR_API_KEY: ${{ secrets.cursor_api_key }}
          BREAKABILITY_SCRIPTS_DIR: ${{ github.workspace }}/.breakability/scripts
          BREAKABILITY_PROMPTS_DIR: ${{ github.workspace }}/.breakability/prompts

      # ── Fallback to template renderer ──────────────────────────────
      - name: Fallback to template renderer
        if: always() && (inputs.skip_agent == true || steps.ai_comments.outputs.ai_comments != 'true')
        run: |
          python3 $BRK_DIR/scripts/breakability_analyst.py /tmp/build-results.json
        env:
          MERGE_PLAN_ISSUE: ${{ steps.merge_plan.outputs.issue_num }}
          ANALYSIS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BREAKABILITY_SCRIPTS_DIR: ${{ github.workspace }}/.breakability/scripts

      # ── Post comments to PRs ───────────────────────────────────────
      - name: Post comments to PRs
        if: always()
        run: |
          POSTED=0
          FAILED=0
          for comment_file in /tmp/pr-*-comment.md; do
            if [ -f "$comment_file" ]; then
              pr_num=$(basename "$comment_file" | sed 's/pr-\([0-9]*\)-comment.md/\1/')
              pr_state=$(gh pr view "$pr_num" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              if [ "$pr_state" != "OPEN" ]; then
                echo "Skipping PR #$pr_num (state=$pr_state)"
                continue
              fi
              if gh pr comment "$pr_num" --body-file "$comment_file"; then
                POSTED=$((POSTED + 1))
              else
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          echo "Posted $POSTED comments ($FAILED failed)"
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}

      # ── Update merge plan issue body ───────────────────────────────
      - name: Update merge plan
        if: always()
        run: |
          MERGE_PLAN_ISSUE="${{ steps.merge_plan.outputs.issue_num }}"
          ANALYSIS_RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          ALL_OPEN_PRS=$(gh pr list --label "${{ inputs.pr_label }}" --state open \
            --json number,title --jq '.[] | "\(.number)\t\(.title)"' --limit 500 2>/dev/null || echo "")
          export ALL_OPEN_PRS

          PLAN_BODY=$(python3 $BRK_DIR/scripts/generate_ai_merge_plan.py /tmp/build-results.json \
            --prompt $BRK_DIR/prompts/breakability-prompt.md \
            --model claude-4.5-sonnet \
            --run-url "$ANALYSIS_RUN_URL")

          if [ -n "$MERGE_PLAN_ISSUE" ]; then
            gh issue edit "$MERGE_PLAN_ISSUE" --body "$PLAN_BODY" || true
          else
            gh issue create \
              --title "Breakability Merge Plan — $(date +%Y-%m-%d)" \
              --label "breakability-merge-plan" \
              --body "$PLAN_BODY" 2>&1 || true
          fi
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
          BRK_AGENT_MODE: live
          BRK_AGENT_MODEL: claude-4.5-sonnet
          CURSOR_API_KEY: ${{ secrets.cursor_api_key }}
          BREAKABILITY_SCRIPTS_DIR: ${{ github.workspace }}/.breakability/scripts
          BREAKABILITY_PROMPTS_DIR: ${{ github.workspace }}/.breakability/prompts

      - name: Upload final results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: |
            /tmp/build-results.json
            /tmp/pr-*.diff
          retention-days: 30
