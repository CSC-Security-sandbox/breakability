# Reusable Breakability Analysis Workflow
#
# This is the RECOMMENDED way to use breakability analysis.
# It runs a 3-job pipeline: discover → parallel deterministic analysis → merge + report.
# 
# Usage in your repo:
#   jobs:
#     breakability:
#       uses: CSC-Security-sandbox/breakability/.github/workflows/breakability-reusable.yml@main
#       with:
#         batch_count: 4
#       secrets:
#         token: ${{ secrets.GITHUB_TOKEN }}
#         breakability_pat: ${{ secrets.BREAKABILITY_PAT }}
#
name: Breakability Analysis (Reusable)

on:
  workflow_call:
    inputs:
      pr_filter:
        description: 'Comma-separated PR numbers (empty = all open Dependabot PRs)'
        required: false
        type: string
        default: ''
      batch_count:
        description: 'Number of parallel batches'
        required: false
        type: number
        default: 1
      skip_agent:
        description: 'Skip Copilot agent (deterministic only, posts fallback comments + merge plan)'
        required: false
        type: boolean
        default: false
      node_version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      go_version:
        description: 'Go version'
        required: false
        type: string
        default: '1.22'
      python_version:
        description: 'Python version'
        required: false
        type: string
        default: '3.12'
    secrets:
      token:
        description: 'GitHub token with PR and Issues write permissions'
        required: false
      breakability_pat:
        description: 'PAT with read access to CSC-Security-sandbox/breakability repo (for cross-repo script download)'
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: breakability-${{ github.repository }}
  cancel-in-progress: false

jobs:
  discover:
    name: "\U0001F50D Discover PRs"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      pr_list: ${{ steps.gen.outputs.pr_list }}
      total: ${{ steps.gen.outputs.total }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Discover Dependabot PRs
        id: gen
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
          BATCH_COUNT: ${{ inputs.batch_count }}
          PR_FILTER: ${{ inputs.pr_filter }}
        run: |
          if [[ -n "$PR_FILTER" ]]; then
            PR_NUMS=$(echo "$PR_FILTER" | tr ',' '\n' | sed 's/ //g' | sort -n)
          else
            PR_NUMS=$(gh pr list --state open --app dependabot --json number --jq '.[].number' | sort -n)
          fi

          TOTAL=$(echo "$PR_NUMS" | grep -c '[0-9]' || echo 0)
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "pr_list=$(echo $PR_NUMS | tr '\n' ',')" >> "$GITHUB_OUTPUT"

          if [[ "$TOTAL" -eq 0 ]]; then
            echo "matrix={\"batch\":[]}" >> "$GITHUB_OUTPUT"
            echo "No Dependabot PRs found"
            exit 0
          fi

          BATCH_SIZE=$(( (TOTAL + BATCH_COUNT - 1) / BATCH_COUNT ))
          BATCHES="["
          BATCH_ID=1
          BATCH_PRS=""
          COUNT=0
          FIRST=true

          while IFS= read -r pr; do
            [[ -z "$pr" ]] && continue
            COUNT=$((COUNT + 1))
            BATCH_PRS="${BATCH_PRS}${BATCH_PRS:+,}${pr}"

            if [[ "$COUNT" -ge "$BATCH_SIZE" ]]; then
              if [[ "$FIRST" == "true" ]]; then
                FIRST=false
              else
                BATCHES="${BATCHES},"
              fi
              BATCHES="${BATCHES}{\"id\":$BATCH_ID,\"prs\":\"$BATCH_PRS\"}"
              BATCH_ID=$((BATCH_ID + 1))
              BATCH_PRS=""
              COUNT=0
            fi
          done <<< "$PR_NUMS"

          if [[ -n "$BATCH_PRS" ]]; then
            if [[ "$FIRST" == "true" ]]; then
              FIRST=false
            else
              BATCHES="${BATCHES},"
            fi
            BATCHES="${BATCHES}{\"id\":$BATCH_ID,\"prs\":\"$BATCH_PRS\"}"
          fi
          BATCHES="${BATCHES}]"

          MATRIX_JSON="{\"batch\":$BATCHES}"
          # Validate JSON before setting output (invalid JSON silently breaks fromJson)
          echo "$MATRIX_JSON" | python3 -c "import sys,json; json.loads(sys.stdin.read())" 2>/dev/null || {
            echo "::error::Generated invalid matrix JSON: $MATRIX_JSON"
            exit 1
          }
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "Discovered $TOTAL PRs split into $(echo $BATCHES | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))' 2>/dev/null || echo $BATCH_COUNT) batches"
          echo "Matrix JSON: $MATRIX_JSON"

  analyze:
    name: "Batch ${{ matrix.batch.id }}"
    needs: discover
    if: ${{ needs.discover.outputs.total > 0 }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ inputs.go_version }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Download breakability scripts
        env:
          GH_TOKEN: ${{ secrets.breakability_pat }}
        run: |
          mkdir -p .breakability/scripts
          for f in scripts/build-check.sh scripts/merge-results.sh scripts/post-fallback-comments.sh; do
            gh api repos/CSC-Security-sandbox/breakability/contents/$f \
              -H "Accept: application/vnd.github.raw+json" > .breakability/$f
          done
          chmod +x .breakability/scripts/*.sh
          echo "Downloaded breakability scripts"

      - name: Run deterministic analysis
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
          GITHUB_TOKEN: ${{ secrets.token || github.token }}
          PR_FILTER: ${{ matrix.batch.prs }}
          BATCH_ID: ${{ matrix.batch.id }}
          REPO_ROOT: ${{ github.workspace }}
        run: |
          bash .breakability/scripts/build-check.sh

      - name: Upload batch results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: breakability-batch-${{ matrix.batch.id }}
          path: /tmp/build-results-${{ matrix.batch.id }}.json
          retention-days: 7
          if-no-files-found: warn

  finalize:
    name: "Merge and Report"
    needs: [discover, analyze]
    if: always() && needs.discover.outputs.total > 0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Download breakability scripts
        env:
          GH_TOKEN: ${{ secrets.breakability_pat }}
        run: |
          mkdir -p .breakability/scripts
          for f in scripts/build-check.sh scripts/merge-results.sh scripts/post-fallback-comments.sh; do
            gh api repos/CSC-Security-sandbox/breakability/contents/$f \
              -H "Accept: application/vnd.github.raw+json" > .breakability/$f
          done
          chmod +x .breakability/scripts/*.sh
          echo "Downloaded breakability scripts"

      - name: Download all batch results
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: breakability-batch-*
          path: /tmp/batch-results/

      - name: Merge results
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          bash .breakability/scripts/merge-results.sh /tmp/batch-results /tmp/build-results.json

      - name: Post fallback comments on PRs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          bash .breakability/scripts/post-fallback-comments.sh

      - name: Post deterministic merge plan
        if: always()
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          # Ensure required labels exist
          gh label create "breakability-merge-plan" --repo "$GITHUB_REPOSITORY" \
            --description "Breakability analysis merge plan" --color "0E8A16" 2>/dev/null || true

          if [[ ! -f /tmp/build-results.json ]]; then
            echo "No results file found, skipping merge plan"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          PR_COUNT="${{ needs.discover.outputs.total }}"

          # Generate merge plan from build-results.json
          MERGE_PLAN=$(python3 << 'PYEOF'
          import json, sys

          with open("/tmp/build-results.json") as f:
              data = json.load(f)

          prs = data.get("prs", {})
          if not prs:
              print("No PRs in results.")
              sys.exit(0)

          safe = []
          review = []
          fails = []

          for pr_num, info in sorted(prs.items(), key=lambda x: int(x[0])):
              build = info.get("build", {})
              verdict = build.get("verdict", "unknown")
              pkg = info.get("package", "unknown")
              from_v = info.get("from_version", "?")
              to_v = info.get("to_version", "?")
              semver = info.get("semver_change", "unknown")
              vl = build.get("verification_label", "")
              entry = f"#{pr_num} `{pkg}` {from_v} → {to_v} ({semver}) {vl}"

              if verdict == "pass":
                  safe.append(entry)
              elif verdict == "fail":
                  fails.append(entry)
              else:
                  review.append(entry)

          lines = []
          if safe:
              lines.append(f"### Safe to Merge ({len(safe)} PRs)")
              for i, s in enumerate(safe, 1):
                  lines.append(f"{i}. {s}")
              lines.append("")

          if review:
              lines.append(f"### Review Recommended ({len(review)} PRs)")
              for i, r in enumerate(review, 1):
                  lines.append(f"{i}. {r}")
              lines.append("")

          if fails:
              lines.append(f"### Build Failures ({len(fails)} PRs)")
              for i, f_entry in enumerate(fails, 1):
                  lines.append(f"{i}. {f_entry}")
              lines.append("")

          lines.append(f"**Summary:** {len(safe)} safe, {len(review)} review, {len(fails)} failing")
          print("\n".join(lines))
          PYEOF
          )

          if [[ -z "$MERGE_PLAN" ]]; then
            echo "Empty merge plan, skipping"
            exit 0
          fi

          # Close old merge plan issues
          OLD_ISSUES=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label "breakability-merge-plan" --state open \
            --json number --jq '.[].number' 2>/dev/null || true)
          for ISSUE_NUM in $OLD_ISSUES; do
            gh issue close "$ISSUE_NUM" --repo "$GITHUB_REPOSITORY" \
              --comment "Superseded by new analysis run at $TIMESTAMP" 2>/dev/null || true
          done

          # Create the merge plan issue
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Merge Plan $TIMESTAMP ($PR_COUNT PRs)" \
            --body "## Merge Plan — $TIMESTAMP

          **PRs analyzed:** $PR_COUNT
          **Generated by:** Deterministic pipeline (breakability-analysis)

          ---

          $MERGE_PLAN

          ---

          > This merge plan is generated from deterministic build results.
          > Merge safe PRs in the order listed. Re-run analysis after merging to refresh." \
            --label "breakability-merge-plan"

          echo "Merge plan created"

      - name: Commit results for Copilot agent
        if: ${{ inputs.skip_agent != true }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          RESULTS_BRANCH="breakability-results"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan "$RESULTS_BRANCH" 2>/dev/null || git checkout "$RESULTS_BRANCH" 2>/dev/null || true
          git reset --hard HEAD 2>/dev/null || true

          cp /tmp/build-results.json ./build-results.json
          if ls /tmp/pr-*.diff 1>/dev/null 2>&1; then
            tar czf ./pr-diffs.tar.gz -C /tmp/ $(ls /tmp/pr-*.diff | xargs -I{} basename {})
          fi

          git add build-results.json pr-diffs.tar.gz 2>/dev/null || git add build-results.json
          git commit -m "Breakability results $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty
          git push origin "$RESULTS_BRANCH" --force

          git checkout "${{ github.ref_name }}" 2>/dev/null || git checkout main

      - name: Trigger Copilot agent via Issue
        if: ${{ inputs.skip_agent != true }}
        env:
          GH_TOKEN: ${{ secrets.token || github.token }}
        run: |
          # Ensure required label exists
          gh label create "breakability-analysis" --repo "$GITHUB_REPOSITORY" \
            --description "Breakability analysis task" --color "1D76DB" 2>/dev/null || true

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          PR_COUNT="${{ needs.discover.outputs.total }}"

          OLD_ISSUES=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label "breakability-analysis" --state open \
            --json number --jq '.[].number' 2>/dev/null || true)
          for ISSUE_NUM in $OLD_ISSUES; do
            gh issue close "$ISSUE_NUM" --repo "$GITHUB_REPOSITORY" \
              --comment "Superseded by new analysis run at $TIMESTAMP" 2>/dev/null || true
          done

          ISSUE_URL=$(gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Breakability Analysis $TIMESTAMP ($PR_COUNT PRs)" \
            --body "## Breakability Analysis Task

          **Run:** $TIMESTAMP
          **PRs analyzed:** $PR_COUNT
          **Results branch:** \`breakability-results\`

          ### Instructions

          You are the breakability-analyst agent. Execute the following:

          1. Fetch build results: git fetch origin breakability-results && git show origin/breakability-results:build-results.json > /tmp/build-results.json
          2. Read the full analysis instructions from .github/breakability-prompt.md
          3. Follow Section 7 (Execution) of that file exactly:
             - Read build-results.json
             - Create ONE merge plan Issue
             - Post structured comments on EVERY PR (100% coverage)
             - Verify counts

          ### Key Rules
          - NEVER close, merge, or modify any PR
          - NEVER override build verdicts
          - Copy verification_label from JSON verbatim
          - 100% PR comment coverage is mandatory
          - Use the comment formats from Section 4 of breakability-prompt.md" \
            --assignee "copilot" \
            --label "breakability-analysis")

          echo "Analysis task created: $ISSUE_URL"
