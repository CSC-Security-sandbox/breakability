# Copilot Agent Setup Steps
# Pre-installs language runtimes in Copilot's ephemeral environment
# See: https://docs.github.com/en/copilot/customizing-copilot/using-copilot-coding-agent/customizing-the-development-environment-for-copilot-coding-agent

name: Copilot Setup Steps

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.22'

      - name: Install common build tools
        run: |
          pip install --quiet setuptools wheel
          echo "✅ Environment ready for breakability analysis"
