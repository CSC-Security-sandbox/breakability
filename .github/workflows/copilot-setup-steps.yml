# Copilot Agent Setup Steps
# Pre-installs language runtimes in Copilot's ephemeral environment
# See: https://docs.github.com/en/copilot/customizing-copilot/using-copilot-coding-agent/customizing-the-development-environment-for-copilot-coding-agent

name: Copilot Setup Steps

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install common build tools
        run: |
          pip install --quiet setuptools wheel
          echo "✅ Environment ready for breakability analysis"
